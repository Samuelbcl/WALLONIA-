<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WALLONIA</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; }
    #app { position: fixed; inset: 0; }
    #app canvas { display: block; }
    #hud {
      position: fixed; top: 8px; left: 8px; z-index: 10;
      font: 12px/1.5 "Cascadia Mono", Consolas, monospace;
      color: #cfe3cf; text-shadow: 0 1px 2px rgba(0,0,0,.8);
      white-space: pre; pointer-events: none; user-select: none;
    }
    #poi { position: fixed; inset: 0; z-index: 9; pointer-events: none; overflow: hidden; }
    #poi .marker {
      position: absolute; transform: translate(-50%, -100%);
      font: 11px/1.2 "Cascadia Mono", Consolas, monospace;
      color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.9);
      padding-bottom: 14px; user-select: none;
    }
    #poi .marker::after {
      content: ""; position: absolute; left: 50%; bottom: 0;
      width: 1px; height: 12px; background: rgba(255,255,255,.7);
    }
    #legal {
      position: fixed; right: 8px; bottom: 6px; z-index: 10;
      font: 10px/1.4 system-ui, sans-serif; color: rgba(255,255,255,.55);
      text-shadow: 0 1px 2px rgba(0,0,0,.8); user-select: none; pointer-events: none;
    }
    #notice {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); z-index: 11;
      font: 12px/1.5 system-ui, sans-serif; color: #ffd28a;
      background: rgba(20, 16, 8, .8); border: 1px solid rgba(255, 210, 138, .4);
      padding: 6px 14px; border-radius: 4px; max-width: 70ch; text-align: center;
    }
    #notice:empty { display: none; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud"></div>
  <div id="poi"></div>
  <div id="notice"></div>
  <div id="legal">Relief : © SPW — MNT 1m 2021-2022 — CC-BY 4.0</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
